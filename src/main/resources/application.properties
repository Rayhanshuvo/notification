spring.application.name=notification

server.port=8082
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/notification?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=app
spring.datasource.password=app123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=update
management.endpoints.web.exposure.include=*

# kafka application.properties (notification)
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

management.endpoint.prometheus.enabled=true